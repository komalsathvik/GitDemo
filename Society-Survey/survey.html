<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society Survey</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Society Survey System</h1>
        <p>Survey Form</p>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="survey.html">Survey</a>
        <a href="election.html">Election</a>
        <a href="results.html">Results</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main>
        <section class="box form-box">
            <h2>Resident Survey</h2>
            <form>
                <label for="resident">Resident Name</label>
                <input type="text" id="resident" name="resident">

                <label for="surveyFlat">Flat Number</label>
                <input type="text" id="surveyFlat" name="surveyFlat">

                <label for="category">Problem Category</label>
                <select id="category" name="category">
                    <option>Maintenance</option>
                    <option>Water Supply</option>
                    <option>Cleanliness</option>
                    <option>Security</option>
                    <option>Parking</option>
                </select>

                <label for="priority">Priority</label>
                <select id="priority" name="priority">
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select>

                <label for="details">Problem Details</label>
                <textarea id="details" name="details" rows="5"></textarea>

                <input type="submit" value="Submit Survey">
                <input type="reset" value="Clear">
            </form>
        </section>
    </main>

    <footer>
        <p>Society Survey Project</p>
    </footer>
</body>
</html>
