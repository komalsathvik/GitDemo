<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Society Survey System</h1>
        <p>Resident Registration</p>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="survey.html">Survey</a>
        <a href="election.html">Election</a>
        <a href="results.html">Results</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main>
        <section class="box form-box">
            <h2>Registration Form</h2>
            <form>
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name">

                <label for="flat">Flat Number</label>
                <input type="text" id="flat" name="flat">

                <label for="mobile">Mobile Number</label>
                <input type="tel" id="mobile" name="mobile">

                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" name="regEmail">

                <label for="memberType">Member Type</label>
                <select id="memberType" name="memberType">
                    <option>Owner</option>
                    <option>Tenant</option>
                </select>

                <input type="submit" value="Register">
                <input type="reset" value="Clear">
            </form>
        </section>
    </main>

    <footer>
        <p>Society Survey Project</p>
    </footer>
</body>
</html>
