<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Society Survey System</h1>
        <p>Contact Details</p>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>

    <main>
        <section class="box">
            <h2>Society Office</h2>
            <p><strong>Email:</strong> societyoffice@example.com</p>
            <p><strong>Phone:</strong> 98765 43210</p>
            <p><strong>Address:</strong> Green Park Society, Main Road, Pune</p>
            <p><strong>Office Time:</strong> 10:00 AM to 5:00 PM</p>
        </section>

        <section class="box form-box">
            <h2>Feedback Form</h2>
            <form>
                <label for="feedbackName">Name</label>
                <input type="text" id="feedbackName" name="feedbackName">

                <label for="feedbackEmail">Email</label>
                <input type="email" id="feedbackEmail" name="feedbackEmail">

                <label for="feedback">Feedback</label>
                <textarea id="feedback" name="feedback" rows="4"></textarea>

                <input type="submit" value="Send">
                <input type="reset" value="Clear">
            </form>
        </section>
    </main>

    <footer>
        <p>Society Survey Project</p>
    </footer>
</body>
</html>
